# Render Blueprint — Deploy Backend + Directive (Discord bot)
# Database: Supabase (cấu hình qua env, không deploy DB trên Render)
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API (Web Service) ─────────────────────────────────
  - type: web
    name: discord-counselor-backend
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"

      # Discord OAuth
      - key: DISCORD_APPLICATION_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false

      # URLs — cập nhật sau khi deploy lần đầu
      - key: DISCORD_REDIRECT_URL
        sync: false
        # VD: https://orias-counselor.duckdns.org/api/auth/discord/callback
      - key: FRONTEND_HOME_URL
        sync: false
        # VD: https://your-frontend-domain.com

      # Database (Supabase)
      - key: DATABASE_POOLER_URL
        sync: false
      - key: DATABASE_DIRECT_URL
        sync: false

      # Redis (Render Redis hoặc Upstash)
      - key: REDIS_STORAGE_URL
        sync: false

  # ── Directive / Discord Bot (Background Worker) ───────────────
  - type: worker
    name: discord-counselor-directive
    runtime: node
    rootDir: directive
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: NODE_VERSION
        value: "22"

      # Discord Bot
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_APPLICATION_ID
        sync: false

      # Backend API — điền URL backend sau deploy
      - key: BACKEND_API_URL
        sync: false
        # VD: https://orias-counselor.duckdns.org/api

      # Redis (cùng instance với backend)
      - key: REDIS_STORAGE_URL
        sync: false
