# ───────────────────────────────────────────────────────────────
# Discord Counselor — CI/CD Pipeline
# Stages: Install → Lint → Build → Docker → Deploy
# ───────────────────────────────────────────────────────────────
name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"

jobs:
  # ─── Stage 1: Install & Lint ────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            directive/package-lock.json
            frontend/package-lock.json

      - name: Install Backend
        run: npm ci
        working-directory: backend

      - name: Install Directive
        run: npm ci
        working-directory: directive

      - name: Install Frontend
        run: npm ci
        working-directory: frontend

      - name: Validate Prisma Schema
        run: npx prisma validate
        working-directory: backend
        env:
          # --- NHÓM 1: Lấy từ GitHub Secrets ---
          POOLER_URL: ${{ secrets.POOLER_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}

          # --- NHÓM 2: Cấu hình môi trường Backend ---
          PORT: 4000
          REDIS_URL: "redis://redis:6379"

          # --- NHÓM 3: Cấu hình môi trường Frontend ---
          FRONTEND_ORIGIN: "https://discord-counselor.onrender.com"
          DISCORD_REDIRECT_URI: "https://discord-counselor.onrender.com/api/auth/discord/callback"

      - name: Check Backend syntax (Node --check)
        run: node --check src/index.js
        working-directory: backend

  # ─── Stage 2: Build ─────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Stage 3: Docker Build (verify images) ──────────────────
  docker:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [backend, frontend, directive]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: discord-counselor-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─── Stage 4: Deploy (only on main push) ────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Deploy hook triggered successfully."
          else
            echo "RENDER_DEPLOY_HOOK_URL not set. Skipping deploy."
          fi
