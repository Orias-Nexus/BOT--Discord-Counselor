# Chạy toàn bộ hệ thống: docker compose up -d
# Cần tạo .env ở từng thư mục (directive, backend) hoặc env_file trong từng service

services:
  redis:
    image: redis:alpine
    container_name: redis-container
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  directive:
    build:
      context: .
      dockerfile: directive/Dockerfile
    env_file:
      - ./directive/.env
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      - backend
      - redis
